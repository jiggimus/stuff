<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Crossing Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f5d87e; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Exact colors sampled from the original video ──────────────────────────
// Gingham 2×2 cell repeat. Zone = (col parity, row parity):
//  (even, even) = open background  — lightest warm gold
//  (odd,  even) = horizontal stripe
//  (even, odd)  = vertical stripe
//  (odd,  odd)  = intersection     — deepest amber (darkest)

const ZONES = [
  [240, 212, 158],   // (even,even) bg             — pale warm gold
  [240, 207, 138],   // (odd, even) h-stripe        — medium amber
  [240, 204, 142],   // (even,odd)  v-stripe        — medium amber
  [241, 191, 137],   // (odd, odd)  intersection    — deepest amber
];

// Cell size in canvas pixels
const CELL = 22;

// Slow diagonal scroll matching the original video's drift
const SPEED_X = 0.25;
const SPEED_Y = 0.25;

let ox = 0, oy = 0, t = 0;

function draw() {
  t  += 0.016;
  ox += SPEED_X;
  oy += SPEED_Y;

  const period = CELL * 2;
  if (ox >= period) ox -= period;
  if (oy >= period) oy -= period;

  const W = canvas.width;
  const H = canvas.height;

  // Gentle global brightness pulse (~±4 on G channel)
  const pulse = Math.sin(t * 0.5) * 4;

  const cols = Math.ceil(W / CELL) + 4;
  const rows = Math.ceil(H / CELL) + 4;

  for (let row = -2; row < rows; row++) {
    for (let col = -2; col < cols; col++) {
      const x = col * CELL - ox;
      const y = row * CELL - oy;

      if (x > W + CELL || y > H + CELL) continue;

      const cx = ((col % 2) + 2) % 2;
      const cy = ((row % 2) + 2) % 2;
      const [r, g, b] = ZONES[cy * 2 + cx];

      // Very subtle per-cell shimmer
      const shimmer = Math.sin(t * 0.7 + (col + row) * 0.35) * 2;

      ctx.fillStyle = `rgb(${r},${Math.min(255, Math.round(g + pulse + shimmer))},${b})`;
      ctx.fillRect(Math.round(x), Math.round(y), CELL + 1, CELL + 1);
    }
  }

  // Soft warm vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, H * 0.15, W/2, H/2, H * 0.85);
  vignette.addColorStop(0, 'rgba(255,230,160,0)');
  vignette.addColorStop(1, 'rgba(180,110,30,0.10)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
